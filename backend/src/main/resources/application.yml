spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskflow}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: TaskFlowPool

  jpa:
    hibernate:
      # Liquibase owns the schema — Hibernate only validates
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    # Never expose Spring's default error body to clients; GlobalExceptionHandler handles all errors
    include-message: never
    include-binding-errors: never

jwt:
  # Fallback is for local dev ONLY — always set JWT_SECRET env var in Docker/production
  secret: ${JWT_SECRET:local-dev-secret-please-change-in-prod-needs-32-chars-min}
  expiration-ms: 86400000   # 24 hours

logging:
  level:
    com.taskflow: INFO
    org.springframework.security: WARN
    liquibase: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
