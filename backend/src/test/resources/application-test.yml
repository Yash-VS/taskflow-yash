spring:
  datasource:
    url: jdbc:h2:mem:taskflow_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

jwt:
  secret: test-secret-valid-for-integration-tests-only-must-be-long-enough-for-hs256
  expiration-ms: 3600000

logging:
  level:
    com.taskflow: DEBUG
